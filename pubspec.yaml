name: check_alert
description: "체크 알리미 - 매일 체크하는 습관 관리 앱"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5

  # State Management
  provider: ^6.1.2

  # Routing
  go_router: ^14.8.1

  # Code Generation (Runtime)
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0

  # Local Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.1

  # Google Sign-In
  google_sign_in: ^7.2.0

  # Calendar
  calendar_date_picker2: ^2.0.1
  table_calendar: ^3.1.3
  flutter_slidable: ^4.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code Generation (Build Time)
  build_runner: ^2.4.14
  freezed: ^3.0.0
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true

  assets:
    - assets/logo/
